name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  lint-and-test:
    name: Lint and Test Go Code
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4 # Keep v4, but GitHub's default runner logic will pull the node24 patch automatically

      # 2. Setup the exact Go environment matching your local setup
      - name: Setup Go
        uses: actions/setup-go@v6 # 🏆 Upgraded from v5 to v6 for native Node 24 mapping support
        with:
          go-version: '1.25.0'
          cache: true # Automatically caches Go modules to make runs faster

      # 3. Download dependencies securely
      - name: Install Dependencies
        run: go mod download

      # 4. Run the enterprise linter step
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9 # 🏆 Upgraded from v6 to v9 for explicit Node 24 runtime support
        with:
          version: v2.5.0 # 🏆 Upgraded to v2 to comply with modern runner requirements
          # skip-cache: true # Add this line to bypass the go.sum cache check

      # 5. Run the entire unit test suite
      - name: Run Unit Tests
        run: go test -v -race -covermode=atomic -coverprofile=coverage.out ./...